<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Karty binarne</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    width: 120px;
    height: 180px;
    perspective: 1000px;
    cursor: pointer;
}

.inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.card.flipped .inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
}

.front img, .back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.back {
    transform: rotateY(180deg);
}
</style>
</head>
<body>

<h1>Karty binarne</h1>
<h2>Suma: <span id="sum">0</span></h2>

<div class="cards">

    <div class="card" data-value="128">
        <div class="inner">
            <div class="front">
                <img src="128_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

    <div class="card" data-value="64">
        <div class="inner">
            <div class="front">
                <img src="64_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

    <div class="card" data-value="32">
        <div class="inner">
            <div class="front">
                <img src="32_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

    <div class="card" data-value="16">
        <div class="inner">
            <div class="front">
                <img src="16_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

    <div class="card" data-value="8">
        <div class="inner">
            <div class="front">
                <img src="8_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

    <div class="card" data-value="4">
        <div class="inner">
            <div class="front">
                <img src="4_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

    <div class="card" data-value="2">
        <div class="inner">
            <div class="front">
                <img src="2_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

    <div class="card" data-value="1">
        <div class="inner">
            <div class="front">
                <img src="1_front.png">
            </div>
            <div class="back">
                <img src="back.png">
            </div>
        </div>
    </div>

</div>

<script>
const cards = document.querySelectorAll(".card");
const sumDisplay = document.getElementById("sum");

function updateSum() {
    let sum = 0;
    cards.forEach(card => {
        if (!card.classList.contains("flipped")) {
            sum += parseInt(card.dataset.value);
        }
    });
    sumDisplay.textContent = sum;
}

cards.forEach(card => {
    card.addEventListener("click", () => {
        card.classList.toggle("flipped");
        updateSum();
    });
});

updateSum();
</script>

</body>
</html>
